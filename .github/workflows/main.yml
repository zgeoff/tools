name: Main

on:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run lint:type-aware
      - run: bun run typecheck
      - run: bun run test

  release:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      # Stub until release tooling lands — see #8. Release tooling decides
      # what changed and what to publish; workflows stay unfiltered.
      - run: |
          echo "release: stubbed pending release tooling (#8)"
          exit 0
