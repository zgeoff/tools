[install]
# pnpm-style symlinked node_modules — no phantom dependencies
linker = "isolated"

# bun add saves exact versions, no ^/~ ranges
exact = true

# supply-chain guard: only install versions published >= 7 days ago
minimumReleaseAge = 604800

[test]
# register jest-extended matchers in every test file
preload = ["./test-setup.ts"]
